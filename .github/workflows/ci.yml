name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Re-enable after cross-compile is green (saves ~20m per push while iterating).
  quality:
    if: false
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y tar xz-utils curl

      - name: Run unit tests
        run: cargo test

      - name: Run coverage
        run: ./coverage.sh

      - name: Run smoke tests
        run: ./smoke.sh

  cross-compile:
    name: Cross-compile (${{ matrix.name }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # needs: quality
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            use_docker: true
            name: Linux x64
            target: x86_64-unknown-linux-gnu
            binary: trypanophobe-linux-x64
            build_cmd: cargo build --release --target x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            use_docker: true
            name: Linux ARM64
            target: aarch64-unknown-linux-gnu
            binary: trypanophobe-linux-arm64
            build_cmd: cargo build --release --target aarch64-unknown-linux-gnu
          - os: macos-latest
            use_docker: false
            name: macOS ARM64
            target: aarch64-apple-darwin
            binary: trypanophobe-darwin-arm64
            build_cmd: cargo build --release --target aarch64-apple-darwin
          - os: ubuntu-latest
            use_docker: true
            name: Windows x64
            target: x86_64-pc-windows-msvc
            binary: trypanophobe-win32-x64.exe
            build_cmd: bash docker/windows-cross-build.sh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Dockerfile.build
        if: matrix.use_docker
        run: docker build -f docker/Dockerfile.build -t trypanophobe-build:ci .

      - name: Setup Rust toolchain
        if: ${{ !matrix.use_docker }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        if: ${{ !matrix.use_docker }}
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo registry
        if: matrix.use_docker
        uses: actions/cache@v4
        with:
          path: .cargo-home
          key: cross-cargo-v4-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cross-cargo-v4-${{ matrix.target }}-

      - name: Cache cross-target build dir
        uses: actions/cache@v4
        with:
          path: cross-target/${{ matrix.target }}
          key: cross-target-v4-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cross-target-v4-${{ matrix.target }}-

      - name: Cross-compile release binary (Docker)
        if: matrix.use_docker
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/build" -w /build \
            -e CARGO_HOME=/build/.cargo-home \
            -e CARGO_TARGET_DIR=/build/cross-target \
            trypanophobe-build:ci -c "rustup target add ${{ matrix.target }} && ${{ matrix.build_cmd }}"

      - name: Cross-compile release binary (macOS)
        if: ${{ !matrix.use_docker }}
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/cross-target
        run: ${{ matrix.build_cmd }}

      - name: Copy binary to artifacts
        run: |
          mkdir -p artifacts
          RELEASE_DIR="cross-target/${{ matrix.target }}/release"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp "${RELEASE_DIR}/trypanophobe.exe" "artifacts/${{ matrix.binary }}"
          else
            cp "${RELEASE_DIR}/trypanophobe" "artifacts/${{ matrix.binary }}"
            chmod +x "artifacts/${{ matrix.binary }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: artifacts/${{ matrix.binary }}
          retention-days: 7

  # Re-enable with quality after all cross-compile matrix jobs pass.
  nightly-release:
    if: false
    name: Nightly release
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: cross-compile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Prepare dist directory
        run: |
          mkdir -p dist
          find artifacts -type f \( -name 'trypanophobe-*' -o -name 'trypanophobe-*.exe' \) -exec cp {} dist/ \;
          chmod +x dist/trypanophobe-* 2>/dev/null || true
          echo "Binaries in dist/:"
          ls -la dist/

      - name: Verify all binaries exist
        run: |
          EXPECTED_BINARIES=(
            trypanophobe-linux-x64
            trypanophobe-linux-arm64
            trypanophobe-darwin-arm64
            trypanophobe-win32-x64.exe
          )
          MIN_SIZE=100000
          ERRORS=0
          for binary in "${EXPECTED_BINARIES[@]}"; do
            if [ ! -f "dist/$binary" ]; then
              echo "ERROR: Missing dist/$binary"
              ERRORS=$((ERRORS + 1))
            else
              SIZE=$(stat -c%s "dist/$binary")
              if [ "$SIZE" -lt "$MIN_SIZE" ]; then
                echo "ERROR: dist/$binary is too small ($SIZE bytes, expected >= $MIN_SIZE)"
                ERRORS=$((ERRORS + 1))
              else
                echo "OK: dist/$binary ($SIZE bytes)"
              fi
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Error: $ERRORS binary issues found"
            exit 1
          fi
          echo "All platform binaries present and valid"

      - name: Create or update nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=nightly
          NOTES="Automated build from ${{ github.sha }} on main."
          if gh release view "$TAG" &>/dev/null; then
            echo "Updating existing nightly release..."
            gh release upload "$TAG" dist/* --clobber
          else
            echo "Creating nightly release..."
            gh release create "$TAG" dist/* \
              --title "Nightly" \
              --prerelease \
              --notes "$NOTES"
          fi
